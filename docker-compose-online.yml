
services:
#################################################
  kos_inspector:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: kos_inspector
    command: /home/user/kos/cross-build.sh --target sim --mode online --role inspector --simulator-ip 172.28.0.2 --server-ip 172.28.0.4 --mqtt-ip 172.28.0.5 --mqtt-username inspector --mqtt-password secret
    working_dir: /home/user/kos
    user: user
    depends_on:
      - arducopter_inspector
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.1
#################################################
  arducopter_inspector:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: arducopter_inspector
    command: /home/user/ardupilot/sitl/arducopter_inspector -S --model + --speedup 1 --slave 0  --serial5=tcp:5775:wait --serial6=tcp:5776:wait --serial7=tcp:5777:wait --defaults copter.parm --sim-address=172.28.0.2 --home=60.0025203,27.8573521,0.00,193 -I1 --sysid 1
    working_dir: /home/user/ardupilot
    user: user
    restart: always
    ports:
      - "5771:5771"
      - "5772:5772"
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.2
#################################################
  kos_deliverer:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: kos_deliverer
    command: /home/user/kos/cross-build.sh --target sim --mode online --role deliverer --simulator-ip 172.28.0.12 --server-ip 172.28.0.4 --mqtt-ip 172.28.0.5 --mqtt-username deliverer --mqtt-password secret
    working_dir: /home/user/kos
    user: user
    depends_on:
      - arducopter_deliverer
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.11
#################################################
  arducopter_deliverer:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: arducopter_deliverer
    command: /home/user/ardupilot/sitl/arducopter_deliverer -S --model + --speedup 1 --slave 0  --serial5=tcp:5765:wait --serial6=tcp:5766:wait --serial7=tcp:5767:wait --defaults copter.parm --sim-address=172.28.0.12 --home=60.0024590,27.8573238,0.00,13 -I0 --sysid 2
    working_dir: /home/user/ardupilot
    user: user
    restart: always
    ports:
      - "5761:5761"
      - "5762:5762"
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.12
#################################################
  mavproxy:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: mavproxy
    command: mavproxy.py --out 172.28.5.254:14550 --out 172.28.5.254:14551 --master tcp:172.28.0.12:5760 --master tcp:172.28.0.2:5770 --sitl 172.28.0.12:5501 --sitl 172.28.0.2:5502 --logfile /home/user/mav.tlog --daemon
    working_dir: /home/user/mavproxy
    user: user
    depends_on:
      - arducopter_inspector
      - arducopter_deliverer
    restart: always
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.3
#################################################
  orvd:
    image: orvd
    build:
      context: .
      dockerfile: ./orvd.Dockerfile
    container_name: orvd
    working_dir: /home/user/orvd
    restart: always
    environment:
      MQTT_HOST: "172.28.0.5"
      MQTT_USERNAME: ${ORVD_MQTT_USERNAME}
      MQTT_PASSWORD: ${ORVD_MQTT_PASSWORD}
    env_file: default.env
    depends_on:
      - mqtt-server
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.4
    ports:
      - "8080:8080"
#################################################
  recognizer:
    image: recognizer
    build:
      context: ./recognizer
      dockerfile: ./Dockerfile
    container_name: recognizer
    restart: always
    environment:
      MQTT_HOST: "172.28.0.5"
      MQTT_PORT: "1883"
      MQTT_USER: ${ORVD_MQTT_USERNAME}
      MQTT_PASSWORD: ${ORVD_MQTT_PASSWORD}
      MQTT_INPUT_TOPIC: "api/image/request"
      MQTT_OUTPUT_TOPIC: "api/image/response"
      RECOGNIZER_TYPE: "stub"
      LOG_LEVEL: "INFO"
    depends_on:
      - mqtt-server
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.6
#################################################
  mqtt-server:
    image: mqtt-server
    build:
      context: .
      dockerfile: ./mqtt-server.Dockerfile
    container_name: mqtt-server
    restart: always
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.5
    ports:
      - "1883:1883"
      - "8883:8883"
#################################################
networks:
  cyberimmune:
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          ip_range: 172.28.5.0/24
          gateway: 172.28.5.254
