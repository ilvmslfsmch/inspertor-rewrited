
services:
#################################################
  kos:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: kos
    command: /home/user/kos/cross-build.sh --target sim --mode online --role inspector --partner-id NULL --board-id inspector --simulator-ip 172.28.0.2 --server-ip 172.28.0.4 --mqtt-ip 172.28.0.5 --mqtt-username inspector --mqtt-password secret
    working_dir: /home/user/kos
    user: user
    depends_on:
      - arducopter
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.1
#################################################
  arducopter:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: arducopter
    command: /home/user/ardupilot/sitl/arducopter_inspector_obstacles -S --model + --speedup 1 --slave 0  --serial5=tcp:5775:wait --serial6=tcp:5776:wait --serial7=tcp:5777:wait --defaults copter.parm --sim-address=172.28.0.2 --home=60.0025203,27.8573521,0.00,193 -I0
    working_dir: /home/user/ardupilot
    user: user
    restart: always
    ports:
      - "5501:5501"
      - "5502:5502"
      - "5760:5760"
      - "5761:5661"
      - "5762:5762"
      - "5763:5763"
      - "5764:5764"
      - "5765:5765"
      - "5766:5766"
      - "5767:5767"
      - "9005:9005"
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.2
#################################################
  mavproxy:
    image: simulator
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: mavproxy
    command: expect /home/user/tests/e2e-online.exp
    working_dir: /home/user/mavproxy
    user: user
    depends_on:
      - arducopter
    restart: "no"
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.3
#################################################
  orvd:
    image: orvd
    build:
      context: .
      dockerfile: ./orvd.Dockerfile
    container_name: orvd
    working_dir: /home/user/orvd
    restart: always
    environment:
      MQTT_HOST: "172.28.0.5"
      MQTT_USERNAME: ${ORVD_MQTT_USERNAME}
      MQTT_PASSWORD: ${ORVD_MQTT_PASSWORD}
    depends_on:
      - mqtt-server
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.4
    ports:
      - "8080:8080"
#################################################
  recognizer:
    image: recognizer
    build:
      context: ./recognizer
      dockerfile: ./Dockerfile
    container_name: recognizer
    restart: always
    environment:
      MQTT_HOST: "172.28.0.5"
      MQTT_PORT: "1883"
      MQTT_USER: ${ORVD_MQTT_USERNAME}
      MQTT_PASSWORD: ${ORVD_MQTT_PASSWORD}
      MQTT_INPUT_TOPIC: "api/image/request"
      MQTT_OUTPUT_TOPIC: "api/image/response"
      RECOGNIZER_TYPE: "stub"
      LOG_LEVEL: "INFO"
    depends_on:
      - mqtt-server
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.6
#################################################
  mqtt-server:
    image: mqtt-server
    build:
      context: .
      dockerfile: ./mqtt-server.Dockerfile
    container_name: mqtt-server
    restart: always
    networks:
      cyberimmune:
        ipv4_address: 172.28.0.5
    ports:
      - "1883:1883"
      - "8883:8883"
#################################################
networks:
  cyberimmune:
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          ip_range: 172.28.5.0/24
          gateway: 172.28.5.254
